      function wa() {
        return `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(CONFIG.waMessage)}`;
      }

      function badgeHTML(badge) {
        if (!badge) return "";
        const colors = {
          LARGE: "bg-pink-500 text-white",
          SMALL: "bg-blue-500 text-white",
          MEDIUM: "bg-green-500 text-white",
        };
        const cls = colors[badge] || "bg-gray-400 text-white";
        return `<span class="absolute top-2 left-2 text-xs font-semibold px-2 py-0.5 rounded-full ${cls}">${badge}</span>`;
      }

      <div class="text-xl sm:text-2xl font-bold" style="color:${CONFIG.primaryColor}">

            style="background:${CONFIG.primaryColor}">

          <a href="${p.link}" target="_blank"
            class="text-xs font-semibold px-3 py-1.5 rounded-full text-white transition-opacity hover:opacity-80"
            style="background:${CONFIG.primaryColor}">Beli</a>

      <br/>
      <span class="text-gray-500">Powered by <a href="https://webkm.id" class="text-white font-semibold hover:underline">WebKM</a></span>
    </div>
  </footer>`;

          renderFeatured() +
          renderAllProducts() +
          renderTestimonials() +
          renderSocial() +
          renderFooter();
